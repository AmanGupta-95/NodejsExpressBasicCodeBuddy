version: "3.8"

services:
  app:
    build:
      context: .
      target: production
    image: nodejs-express-basic:latest
    container_name: nodejs-express-app
    restart: unless-stopped
    volumes:
      - .:/src
    ports:
      - "${PORT:-7777}:${PORT:-7777}"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${PORT:-7777}
    env_file:
      - .env
    networks:
      - app-network

  mongodb:
    image: mongo:7.0-jammy
    container_name: mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USERNAME:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD:-adminpassword}
      - MONGO_INITDB_DATABASE=${MONGO_DB_NAME:-nodejs-express-db}
    volumes:
      - mongodb-data:/data/db
      - mongodb-config:/data/configdb
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mongodb-data:
    driver: local
  mongodb-config:
    driver: local
